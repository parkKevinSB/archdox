# ArchDox production reverse proxy baseline.
# Replace server_name and upstream addresses for the target deployment.

limit_req_zone $binary_remote_addr zone=archdox_auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=archdox_admin:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=archdox_api:20m rate=10r/s;
limit_req_zone $binary_remote_addr zone=archdox_upload:20m rate=1r/s;
limit_req_zone $binary_remote_addr zone=archdox_agent_ws:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=archdox_agent_api:20m rate=5r/s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream archdox_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name example.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name example.com;

    # ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    client_body_timeout 30s;
    client_header_timeout 10s;
    keepalive_timeout 65s;
    send_timeout 30s;

    client_max_body_size 10m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /api/v1/auth/login {
        limit_req zone=archdox_auth burst=5 nodelay;
        proxy_pass http://archdox_api;
    }

    location = /api/v1/auth/signup {
        limit_req zone=archdox_auth burst=3 nodelay;
        proxy_pass http://archdox_api;
    }

    location = /api/v1/auth/refresh {
        limit_req zone=archdox_auth burst=20 nodelay;
        proxy_pass http://archdox_api;
    }

    location /api/v1/platform-admin/ {
        # Prefer Cloudflare Access or VPN for this path in production.
        # Temporary fallback:
        # auth_basic "ArchDox platform admin";
        # auth_basic_user_file /etc/nginx/.archdox-platform-admin.htpasswd;
        limit_req zone=archdox_admin burst=20 nodelay;
        proxy_pass http://archdox_api;
    }

    location /api/v1/office-ops/ {
        limit_req zone=archdox_admin burst=30 nodelay;
        proxy_pass http://archdox_api;
    }

    location /agent/ws {
        limit_req zone=archdox_agent_ws burst=10 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_pass http://archdox_api;
    }

    location /agent/api/ {
        client_max_body_size 100m;
        limit_req zone=archdox_agent_api burst=20 nodelay;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_pass http://archdox_api;
    }

    location ~ ^/api/v1/.*/(content|upload|upload-intents) {
        client_max_body_size 100m;
        limit_req zone=archdox_upload burst=10 nodelay;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_pass http://archdox_api;
    }

    location /api/ {
        limit_req zone=archdox_api burst=60 nodelay;
        proxy_pass http://archdox_api;
    }
}
