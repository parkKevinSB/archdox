map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_x_forwarded_proto $archdox_forwarded_proto {
    default $http_x_forwarded_proto;
    '' $scheme;
}

map $http_x_forwarded_for $archdox_real_ip {
    ~^(?<first_forwarded_ip>[a-fA-F0-9:.%-]+) $first_forwarded_ip;
    default $remote_addr;
}

client_body_timeout 30s;
client_header_timeout 10s;
send_timeout 30s;
client_max_body_size 100m;

proxy_set_header Host $host;
proxy_set_header X-Real-IP $archdox_real_ip;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $archdox_forwarded_proto;

server {
    listen 80;
    server_name api.archdox.co.kr;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $archdox_api http://api-server:8080;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_pass $archdox_api;
    }
}

server {
    listen 80;
    server_name app.archdox.co.kr;
    root /usr/share/nginx/html/client;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $archdox_api http://api-server:8080;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_pass $archdox_api;
    }

    location /agent/ws {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_pass $archdox_api;
    }

    location /agent/api/ {
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_pass $archdox_api;
    }

    location /actuator/health {
        proxy_pass $archdox_api;
    }

    location = /admin {
        return 301 https://admin.archdox.co.kr/;
    }

    location /admin/ {
        return 301 https://admin.archdox.co.kr/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name admin.archdox.co.kr;
    root /usr/share/nginx/html/admin;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $archdox_api http://api-server:8080;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_pass $archdox_api;
    }

    location /agent/ws {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_pass $archdox_api;
    }

    location /agent/api/ {
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_pass $archdox_api;
    }

    location /actuator/health {
        proxy_pass $archdox_api;
    }

    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files /index.html =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80 default_server;
    server_name archdox.co.kr www.archdox.co.kr _;
    root /usr/share/nginx/html/public;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location = /admin {
        return 301 https://admin.archdox.co.kr/;
    }

    location /admin/ {
        return 301 https://admin.archdox.co.kr/;
    }

    location = /app {
        return 301 https://app.archdox.co.kr/;
    }

    location /app/ {
        return 301 https://app.archdox.co.kr/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
