services:
  postgres:
    image: postgres:16-alpine
    container_name: archdox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: archdox
      POSTGRES_USER: archdox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - archdox-postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: archdox-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - archdox-minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: archdox-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      ARCHDOX_S3_BUCKET: ${ARCHDOX_S3_BUCKET}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 2; done;
      /usr/bin/mc mb -p local/$$ARCHDOX_S3_BUCKET || true;
      exit 0;
      "

  api-server:
    build:
      context: ../..
      dockerfile: infra/docker/cloud-api/Dockerfile
    image: archdox/cloud-api:lightsail
    container_name: archdox-api-server
    restart: unless-stopped
    depends_on:
      - postgres
      - minio
      - minio-init
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/archdox
      DB_USERNAME: archdox
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AGENT_API_INSTANCE_ID: lightsail-api-1
      AGENT_ALLOW_SHARED_SECRET_AUTH: "true"
      AGENT_SHARED_SECRET: ${AGENT_SHARED_SECRET}
      ARCHDOX_CORS_ALLOWED_ORIGINS: ${ARCHDOX_CORS_ALLOWED_ORIGINS}
      ARCHDOX_RATE_LIMIT_USE_FORWARDED_HEADERS: ${ARCHDOX_RATE_LIMIT_USE_FORWARDED_HEADERS:-true}
      ARCHDOX_MULTIPART_MAX_FILE_SIZE: ${ARCHDOX_MULTIPART_MAX_FILE_SIZE:-100MB}
      ARCHDOX_MULTIPART_MAX_REQUEST_SIZE: ${ARCHDOX_MULTIPART_MAX_REQUEST_SIZE:-120MB}
      ARCHDOX_STORAGE_ACTIVE: S3_COMPATIBLE
      ARCHDOX_S3_ENDPOINT: http://minio:9000
      ARCHDOX_S3_REGION: ap-northeast-2
      ARCHDOX_S3_BUCKET: ${ARCHDOX_S3_BUCKET}
      ARCHDOX_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      ARCHDOX_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      ARCHDOX_S3_PATH_STYLE_ACCESS: "true"
      PHOTO_UPLOAD_TARGET: API_LOCAL
      PHOTO_LOCAL_ROOT: /var/lib/archdox/photos
      DOCUMENT_LOCAL_ROOT: ${DOCUMENT_LOCAL_ROOT:-/var/lib/archdox/documents}
      PHOTO_S3_ENDPOINT: http://minio:9000
      PHOTO_S3_REGION: ap-northeast-2
      PHOTO_S3_BUCKET: ${ARCHDOX_S3_BUCKET}
      PHOTO_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      PHOTO_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      PHOTO_S3_PATH_STYLE_ACCESS: "true"
      ARCHDOX_AI_FAKE_PROVIDER_ENABLED: "true"
      ARCHDOX_AI_DEV_BOOTSTRAP_ENABLED: ${ARCHDOX_AI_DEV_BOOTSTRAP_ENABLED:-false}
      DOCUMENT_AI_REVIEW_ENABLED: "true"
      LEGAL_OPEN_API_ENABLED: ${LEGAL_OPEN_API_ENABLED:-false}
      LEGAL_OPEN_API_OC: ${LEGAL_OPEN_API_OC:-}
      LEGAL_OPEN_API_REQUEST_INTERVAL_MS: ${LEGAL_OPEN_API_REQUEST_INTERVAL_MS:-800}
      LEGAL_OPEN_API_MAX_ATTEMPTS: ${LEGAL_OPEN_API_MAX_ATTEMPTS:-3}
      PLATFORM_ADMIN_BOOTSTRAP_EMAILS: vvzerg@test.co.kr
    volumes:
      - archdox-api-data:/var/lib/archdox
      - archdox-api-logs:/var/log/archdox

  archdox-agent-personal:
    build:
      context: ../..
      dockerfile: infra/docker/archdox-agent/Dockerfile
    image: archdox/archdox-agent:lightsail
    container_name: archdox-agent-personal
    restart: unless-stopped
    depends_on:
      - api-server
    environment:
      SPRING_PROFILES_ACTIVE: local
      CLOUD_AGENT_WS_URL: ws://api-server:8080/agent/ws
      CLOUD_API_BASE_URL: http://api-server:8080
      AGENT_WS_ENABLED: "true"
      AGENT_AUTH_MODE: SHARED_SECRET
      AGENT_OFFICE_ID: 1
      AGENT_CODE: cloud-personal-main
      AGENT_DEPLOYMENT_MODE: CLOUD_MANAGED
      AGENT_SHARED_SECRET: ${AGENT_SHARED_SECRET}
      AGENT_LOCAL_STORAGE_ROOT: /var/lib/archdox-agent
      DOCUMENT_EXPORT_LIBREOFFICE_ENABLED: "true"
      DOCUMENT_EXPORT_LIBREOFFICE_PATH: soffice
    volumes:
      - archdox-agent-personal-data:/var/lib/archdox-agent
      - archdox-agent-personal-logs:/var/log/archdox

  archdox-agent-inwoo:
    build:
      context: ../..
      dockerfile: infra/docker/archdox-agent/Dockerfile
    image: archdox/archdox-agent:lightsail
    container_name: archdox-agent-inwoo
    restart: unless-stopped
    depends_on:
      - api-server
      - archdox-agent-personal
    environment:
      SPRING_PROFILES_ACTIVE: local
      CLOUD_AGENT_WS_URL: ws://api-server:8080/agent/ws
      CLOUD_API_BASE_URL: http://api-server:8080
      AGENT_WS_ENABLED: "true"
      AGENT_AUTH_MODE: SHARED_SECRET
      AGENT_OFFICE_ID: 2
      AGENT_CODE: cloud-inwoo-main
      AGENT_DEPLOYMENT_MODE: CLOUD_MANAGED
      AGENT_SHARED_SECRET: ${AGENT_SHARED_SECRET}
      AGENT_LOCAL_STORAGE_ROOT: /var/lib/archdox-agent
      DOCUMENT_EXPORT_LIBREOFFICE_ENABLED: "true"
      DOCUMENT_EXPORT_LIBREOFFICE_PATH: soffice
    volumes:
      - archdox-agent-inwoo-data:/var/lib/archdox-agent
      - archdox-agent-inwoo-logs:/var/log/archdox

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web/Dockerfile
    image: archdox/web:lightsail
    container_name: archdox-web
    restart: unless-stopped
    depends_on:
      - api-server
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    container_name: archdox-caddy
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - archdox-caddy-data:/data
      - archdox-caddy-config:/config

volumes:
  archdox-postgres-data:
  archdox-minio-data:
  archdox-api-data:
  archdox-api-logs:
  archdox-caddy-data:
  archdox-caddy-config:
  archdox-agent-personal-data:
  archdox-agent-personal-logs:
  archdox-agent-inwoo-data:
  archdox-agent-inwoo-logs:
