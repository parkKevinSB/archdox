spring:
  application:
    name: archdox-agent

server:
  port: ${SERVER_PORT:18080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

archdox:
  agent:
    cloud-ws-url: ${CLOUD_AGENT_WS_URL:ws://localhost:8080/agent/ws}
    cloud-http-base-url: ${CLOUD_API_BASE_URL:http://localhost:8080}
    enabled: ${AGENT_WS_ENABLED:false}
    auth-mode: ${AGENT_AUTH_MODE:}
    agent-id: ${AGENT_ID:}
    office-id: ${AGENT_OFFICE_ID:0}
    agent-code: ${AGENT_CODE:local-dev}
    deployment-mode: ${AGENT_DEPLOYMENT_MODE:LOCAL_OFFICE}
    token: ${AGENT_SHARED_SECRET:dev-agent-secret-change-me}
    install-token: ${AGENT_INSTALL_TOKEN:}
    device-secret: ${AGENT_DEVICE_SECRET:}
    version: ${AGENT_VERSION:0.0.1-dev}
    protocol-version: ${AGENT_PROTOCOL_VERSION:2026-06-25}
    launcher-version: ${AGENT_LAUNCHER_VERSION:embedded}
    update-channel: ${AGENT_UPDATE_CHANNEL:stable}
    heartbeat-interval-ms: ${AGENT_HEARTBEAT_INTERVAL_MS:30000}
    websocket-max-text-message-buffer-bytes: ${AGENT_WS_MAX_TEXT_MESSAGE_BUFFER_BYTES:2097152}
    websocket-max-binary-message-buffer-bytes: ${AGENT_WS_MAX_BINARY_MESSAGE_BUFFER_BYTES:2097152}
    local-storage-root: ${AGENT_LOCAL_STORAGE_ROOT:build/archdox-agent-storage}
    execution:
      document-render-concurrency: ${AGENT_DOCUMENT_RENDER_CONCURRENCY:2}
      document-render-queue-capacity: ${AGENT_DOCUMENT_RENDER_QUEUE_CAPACITY:50}
      photo-pickup-concurrency: ${AGENT_PHOTO_PICKUP_CONCURRENCY:4}
      photo-pickup-queue-capacity: ${AGENT_PHOTO_PICKUP_QUEUE_CAPACITY:100}
      artifact-delivery-concurrency: ${AGENT_ARTIFACT_DELIVERY_CONCURRENCY:4}
      artifact-delivery-queue-capacity: ${AGENT_ARTIFACT_DELIVERY_QUEUE_CAPACITY:100}
    storage:
      original:
        kind: ${AGENT_ORIGINAL_STORAGE_KIND:LOCAL_FILE}
        root-path: ${AGENT_ORIGINAL_ROOT:${AGENT_LOCAL_STORAGE_ROOT:build/archdox-agent-storage}}
        bucket: ${AGENT_ORIGINAL_BUCKET:}
        prefix: ${AGENT_ORIGINAL_PREFIX:}
      working:
        kind: ${AGENT_WORKING_STORAGE_KIND:LOCAL_FILE}
        root-path: ${AGENT_WORKING_ROOT:${AGENT_LOCAL_STORAGE_ROOT:build/archdox-agent-storage}}
        bucket: ${AGENT_WORKING_BUCKET:}
        prefix: ${AGENT_WORKING_PREFIX:}
      artifact:
        kind: ${AGENT_ARTIFACT_STORAGE_KIND:LOCAL_FILE}
        root-path: ${AGENT_ARTIFACT_ROOT:${AGENT_LOCAL_STORAGE_ROOT:build/archdox-agent-storage}}
        bucket: ${AGENT_ARTIFACT_BUCKET:}
        prefix: ${AGENT_ARTIFACT_PREFIX:}
      template:
        kind: ${AGENT_TEMPLATE_STORAGE_KIND:LOCAL_FILE}
        root-path: ${AGENT_TEMPLATE_ROOT:${AGENT_LOCAL_STORAGE_ROOT:build/archdox-agent-storage}}
        bucket: ${AGENT_TEMPLATE_BUCKET:}
        prefix: ${AGENT_TEMPLATE_PREFIX:}
      s3-compatible:
        endpoint: ${AGENT_S3_ENDPOINT:${ARCHDOX_S3_ENDPOINT:}}
        region: ${AGENT_S3_REGION:${ARCHDOX_S3_REGION:ap-northeast-2}}
        access-key: ${AGENT_S3_ACCESS_KEY:${ARCHDOX_S3_ACCESS_KEY:}}
        secret-key: ${AGENT_S3_SECRET_KEY:${ARCHDOX_S3_SECRET_KEY:}}
        path-style-access: ${AGENT_S3_PATH_STYLE_ACCESS:${ARCHDOX_S3_PATH_STYLE_ACCESS:true}}
  documents:
    export:
      libre-office:
        enabled: ${DOCUMENT_EXPORT_LIBREOFFICE_ENABLED:false}
        executable-path: ${DOCUMENT_EXPORT_LIBREOFFICE_PATH:soffice}
        timeout-ms: ${DOCUMENT_EXPORT_LIBREOFFICE_TIMEOUT_MS:60000}
