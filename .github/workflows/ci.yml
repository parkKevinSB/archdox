name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout ArchDox
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Compile backend modules
        run: ./gradlew :cloud-api:compileJava :archdox-agent:compileJava --no-daemon

      - name: Run backend tests
        run: ./gradlew test --no-daemon

  frontend:
    name: Frontend (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        app:
          - client/web
          - admin

    steps:
      - name: Checkout ArchDox
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.app }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.app }}

  docker-compose:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout ArchDox
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config --quiet
