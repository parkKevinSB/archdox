spring:
  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:openai}

archdox:
  ai:
    credentials:
      master-key: ${ARCHDOX_AI_CREDENTIAL_MASTER_KEY:}
  office-storage:
    credentials:
      master-key: ${ARCHDOX_OFFICE_STORAGE_CREDENTIAL_MASTER_KEY:}
  storage:
    active: S3_COMPATIBLE
    s3-compatible:
      endpoint: ${ARCHDOX_S3_ENDPOINT:}
      region: ${ARCHDOX_S3_REGION:ap-northeast-2}
      bucket-name: ${ARCHDOX_S3_BUCKET}
      access-key: ${ARCHDOX_S3_ACCESS_KEY}
      secret-key: ${ARCHDOX_S3_SECRET_KEY}
      path-style-access: ${ARCHDOX_S3_PATH_STYLE_ACCESS:false}
  photos:
    storage:
      upload-target: ${PHOTO_UPLOAD_TARGET:CLOUD_MEDIATED}
  agent:
    allow-shared-secret-auth: ${AGENT_ALLOW_SHARED_SECRET_AUTH:false}
  security:
    rate-limit:
      enabled: ${ARCHDOX_RATE_LIMIT_ENABLED:true}
      use-forwarded-headers: ${ARCHDOX_RATE_LIMIT_USE_FORWARDED_HEADERS:true}
