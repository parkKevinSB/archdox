archdox:
  ai-review:
    enabled: ${DOCUMENT_AI_REVIEW_ENABLED:true}
  ai:
    credentials:
      master-key: ${ARCHDOX_AI_CREDENTIAL_MASTER_KEY:dev-only-archdox-ai-credential-key-change-me}
    fake-provider:
      enabled: ${ARCHDOX_AI_FAKE_PROVIDER_ENABLED:true}
    dev-bootstrap:
      enabled: ${ARCHDOX_AI_DEV_BOOTSTRAP_ENABLED:true}
      attach-to-existing-offices: ${ARCHDOX_AI_DEV_BOOTSTRAP_ATTACH_OFFICES:true}
  storage:
    active: LOCAL_FILE
    local-file:
      root-path: ${ARCHDOX_LOCAL_FILE_ROOT:build/storage}
      bucket-name: local-dev
  photos:
    storage:
      upload-target: ${PHOTO_UPLOAD_TARGET:API_LOCAL}
      local-root: ${PHOTO_LOCAL_ROOT:build/photo-storage}
  documents:
    storage:
      local-root: ${DOCUMENT_LOCAL_ROOT:build/document-storage}
  platform-admin:
    ops:
      ai-diagnosis:
        enabled: ${PLATFORM_OPS_AI_DIAGNOSIS_ENABLED:true}
        provider-code: ${PLATFORM_OPS_AI_PROVIDER_CODE:fake-ops}
        model: ${PLATFORM_OPS_AI_MODEL:fake-ops-model}
