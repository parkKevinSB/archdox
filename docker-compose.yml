services:
  postgres:
    image: postgres:16-alpine
    container_name: archdox-postgres
    environment:
      POSTGRES_DB: archdox
      POSTGRES_USER: archdox
      POSTGRES_PASSWORD: archdox
    ports:
      - "5432:5432"
    volumes:
      - archdox-postgres-data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: archdox-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: archdox-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: archdox
      MINIO_ROOT_PASSWORD: archdox-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - archdox-minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: archdox-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 archdox archdox-password; do sleep 2; done;
      /usr/bin/mc mb -p local/archdox-local || true;
      exit 0;
      "

  api-server:
    image: gradle:8.14-jdk21
    container_name: archdox-api-server
    profiles:
      - app
    working_dir: /workspace
    command: sh -c "chmod +x gradlew && ./gradlew :cloud-api:bootRun --no-daemon"
    depends_on:
      - postgres
      - minio
      - minio-init
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://postgres:5432/archdox
      DB_USERNAME: archdox
      DB_PASSWORD: archdox
      ARCHDOX_S3_ENDPOINT: http://minio:9000
      ARCHDOX_S3_BUCKET: archdox-local
      ARCHDOX_S3_ACCESS_KEY: archdox
      ARCHDOX_S3_SECRET_KEY: archdox-password
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
      - gradle-cache:/home/gradle/.gradle

  local-agent:
    image: gradle:8.14-jdk21
    container_name: archdox-local-agent
    profiles:
      - app
    working_dir: /workspace
    command: sh -c "chmod +x gradlew && ./gradlew :archdox-agent:bootRun --no-daemon"
    depends_on:
      - api-server
    environment:
      SPRING_PROFILES_ACTIVE: local
      CLOUD_AGENT_WS_URL: ${CLOUD_AGENT_WS_URL:-ws://api-server:8080/agent/ws}
      CLOUD_API_BASE_URL: ${CLOUD_API_BASE_URL:-http://api-server:8080}
      AGENT_WS_ENABLED: ${AGENT_WS_ENABLED:-false}
      AGENT_OFFICE_ID: ${AGENT_OFFICE_ID:-0}
      AGENT_CODE: ${AGENT_CODE:-local-agent}
      AGENT_SHARED_SECRET: ${AGENT_SHARED_SECRET:-dev-agent-secret-change-me}
      AGENT_LOCAL_STORAGE_ROOT: /var/lib/archdox-agent
    ports:
      - "18080:18080"
    volumes:
      - .:/workspace
      - gradle-cache:/home/gradle/.gradle
      - archdox-agent-data:/var/lib/archdox-agent

  ollama:
    image: ollama/ollama:0.6.6
    container_name: archdox-ollama
    profiles:
      - ai
    ports:
      - "11434:11434"
    volumes:
      - archdox-ollama-data:/root/.ollama

volumes:
  archdox-postgres-data:
  archdox-minio-data:
  archdox-agent-data:
  archdox-ollama-data:
  gradle-cache:
